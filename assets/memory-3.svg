<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 780" role="img" aria-labelledby="title desc">
  <title id="title">A dated memory card</title>
  <desc id="desc">A quiet card with the date 17/3 and soft blue green light.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a1a21"/>
      <stop offset=".52" stop-color="#2b7b80"/>
      <stop offset="1" stop-color="#f1d19a"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fffaf0" stop-opacity=".95"/>
      <stop offset="1" stop-color="#dbe9e5" stop-opacity=".82"/>
    </linearGradient>
    <filter id="shadow" x="-25%" y="-25%" width="150%" height="150%">
      <feDropShadow dx="0" dy="24" stdDeviation="24" flood-color="#061015" flood-opacity=".32"/>
    </filter>
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency=".7" numOctaves="3" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 .12"/>
      </feComponentTransfer>
    </filter>
  </defs>
  <rect width="1000" height="780" fill="url(#bg)"/>
  <path d="M0 560 C190 480 318 530 470 468 C650 394 792 430 1000 350 L1000 780 L0 780 Z" fill="#071117" opacity=".22"/>
  <g filter="url(#shadow)">
    <rect x="278" y="150" width="444" height="480" rx="24" fill="url(#card)" stroke="#fffaf0" stroke-opacity=".4"/>
    <path d="M336 250 H664" stroke="#8a7b67" stroke-opacity=".22" stroke-width="4"/>
    <path d="M336 336 H664" stroke="#8a7b67" stroke-opacity=".18" stroke-width="3"/>
    <path d="M336 392 H602" stroke="#8a7b67" stroke-opacity=".18" stroke-width="3"/>
    <text x="500" y="520" text-anchor="middle" font-family="Georgia, serif" font-size="118" fill="#263138">17/3</text>
    <text x="500" y="568" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="26" fill="#6f6257">our little beginning</text>
  </g>
  <circle cx="210" cy="188" r="5" fill="#fffaf0" opacity=".5"/>
  <circle cx="806" cy="250" r="4" fill="#fffaf0" opacity=".45"/>
  <circle cx="758" cy="610" r="6" fill="#fffaf0" opacity=".3"/>
  <rect width="1000" height="780" filter="url(#grain)" opacity=".7"/>
</svg>
